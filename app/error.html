<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — StreamFlix</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e8e8ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-page h1 {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e50914, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .error-page h2 {
            font-size: 1.5rem;
            margin: 1rem 0 0.5rem;
            color: #fff;
        }
        .error-page p {
            color: #8b8b9e;
            max-width: 400px;
            margin: 0 auto 2rem;
        }
        .error-page a {
            display: inline-block;
            background: #e50914;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .error-page a:hover {
            background: #ff1a26;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1>404</h1>
        <h2>Lost in the Cloud</h2>
        <p>The page you're looking for doesn't exist. It might have been moved, deleted, or you might have the wrong URL.</p>
        <a href="/">← Back to StreamFlix</a>
    </div>
</body>
</html>
